app = "seo-geo-ai-roadmap"
primary_region = "ams"

[build]
  dockerfile = "app/backend/Dockerfile"

[env]
  APP_DEFAULT_REPORT_LANGUAGE = "en"
  APP_AUTO_CREATE_SCHEMA = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
