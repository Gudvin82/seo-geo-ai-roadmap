apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seo-geo-ai
  namespace: seo-geo-ai
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seo-geo-ai-frontend
                port:
                  number: 80
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seo-geo-ai-backend
                port:
                  number: 8000
