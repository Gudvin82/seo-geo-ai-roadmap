<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <rect width="1440" height="900" fill="#eef2ea"/>
  <rect x="56" y="48" width="1328" height="804" rx="28" fill="#fbfcf8" stroke="#c3d0c0"/>
  <text x="96" y="122" fill="#184835" font-family="Arial, sans-serif" font-size="36">Provider and access proof</text>
  <text x="96" y="164" fill="#425245" font-family="Arial, sans-serif" font-size="20">Ollama, LocalAI, and role-based collaboration as operator-facing features in v2.2.0</text>
  <rect x="96" y="212" width="586" height="560" rx="24" fill="#fff" stroke="#cad6c7"/>
  <text x="132" y="260" fill="#184835" font-family="Arial, sans-serif" font-size="24">Provider settings</text>
  <text x="132" y="304" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">- OpenAI: cloud, API key</text>
  <text x="132" y="338" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">- Gemini: cloud, API key</text>
  <text x="132" y="372" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">- Ollama: local, base URL, no key by default</text>
  <text x="132" y="406" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">- LocalAI: local, OpenAI-style endpoint</text>
  <text x="132" y="440" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">- vLLM: local, optional bearer token</text>
  <rect x="724" y="212" width="560" height="560" rx="24" fill="#fff" stroke="#cad6c7"/>
  <text x="760" y="260" fill="#184835" font-family="Arial, sans-serif" font-size="24">Roles and invites</text>
  <text x="760" y="304" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">owner: full control</text>
  <text x="760" y="338" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">admin: invites, providers, logs</text>
  <text x="760" y="372" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">editor: projects, brand facts, audits</text>
  <text x="760" y="406" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">viewer: reports and artifacts</text>
  <text x="760" y="460" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">Invite flow:</text>
  <text x="760" y="494" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">1. create invite</text>
  <text x="760" y="528" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">2. accept with matching email</text>
  <text x="760" y="562" fill="#2f3c34" font-family="Arial, sans-serif" font-size="18">3. audit log records access change</text>
</svg>
