name: ai-visibility-check

on:
  pull_request:
  schedule:
    - cron: "17 6 * * 1"

jobs:
  discoverability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run AI visibility check
        uses: Gudvin82/seo-geo-ai-roadmap/.github/actions/ai-visibility-check@v4.0.0
        with:
          target-url: https://example.com
          mode: quick
      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-visibility-check
          path: ci-artifacts/ai-visibility-check.json
