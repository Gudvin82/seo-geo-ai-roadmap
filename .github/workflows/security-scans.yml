name: security-scans

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
      - name: Audit backend dependencies
        run: |
          pip-audit -r app/backend/requirements.txt \
            --ignore-vuln GHSA-6w46-j5rx-g56g \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln GHSA-7f5h-v6xp-fcq8 \
            --ignore-vuln GHSA-wqp7-x3pw-xc5r \
            --ignore-vuln GHSA-x746-7m8f-x49c \
            -f json -o pip-audit-report.json
          cat pip-audit-report.json
      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install gitleaks CLI
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repository for secrets
        run: |
          gitleaks detect --no-git --source . --report-format json --report-path gitleaks-report.json
          cat gitleaks-report.json
      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
