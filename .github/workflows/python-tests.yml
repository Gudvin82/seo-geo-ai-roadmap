name: python-tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      APP_DATABASE_URL: sqlite:////tmp/discoverability-ci.db
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/backend/requirements.txt
          python -m pip install ruff yamllint

      - name: Run formatting and YAML checks
        run: |
          ruff check app/backend/app app/backend/tests tests scripts
          ruff format --check app/backend/app app/backend/tests tests scripts
          yamllint .github/workflows docker-compose.yml mkdocs.yml

      - name: Run migrations
        run: PYTHONPATH=app/backend python -m alembic upgrade head

      - name: Run repository and app tests
        run: |
          python scripts/version_consistency_check.py
          python -m pytest tests
          PYTHONPATH=app/backend python -m pytest --cov=app/backend/app --cov-report=term-missing --cov-report=xml:coverage.xml app/backend/tests

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
